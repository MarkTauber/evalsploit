[dl]
dl = dl.php

[upload]
upload = upload.php

[rename]
rename = rename.php

[stat]
stat = stat.php

[touch]
touch = touch.php

[mf]
mf = mf.php

[md]
md = md.php

[copy]
copy = copy.php
